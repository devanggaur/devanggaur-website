<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z2KVE5Y7EP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-Z2KVE5Y7EP');

      // Track 404 errors
      gtag('event', 'page_not_found', {
        'event_category': 'Error',
        'event_label': window.location.pathname,
        'value': 1
      });
    </script>

    <!-- Hotjar Tracking Code for My website -->
    <script>
        (function(h,o,t,j,a,r){
            h.hj=h.hj||function(){(h.hj.q=h.hj.q||[]).push(arguments)};
            h._hjSettings={hjid:6612265,hjsv:6};
            a=o.getElementsByTagName('head')[0];
            r=o.createElement('script');r.async=1;
            r.src=t+h._hjSettings.hjid+j+h._hjSettings.hjsv;
            a.appendChild(r);
        })(window,document,'https://static.hotjar.com/c/hotjar-','.js?sv=');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Devang Gaur</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #0C0C0C;
            --bg-card:      #141414;
            --text:         #EDEAE4;
            --text-dim:     #888888;
            --text-muted:   #555555;
            --accent:       #F5A623;
            --accent-dim:   rgba(245,166,35,0.12);
            --accent-glow:  rgba(245,166,35,0.07);
            --border:       rgba(255,255,255,0.07);
            --sans:         'Syne', sans-serif;
            --body:         'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--body);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -60%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(245,166,35,0.05) 0%, transparent 65%);
            pointer-events: none;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-family: var(--sans);
            font-size: 10rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.9;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 0.65; }
        }

        h1 {
            font-family: var(--sans);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text);
        }

        p {
            font-size: 1.05rem;
            margin-bottom: 2rem;
            color: var(--text-dim);
            line-height: 1.7;
        }

        .error-message {
            background: var(--accent-glow);
            border-left: 3px solid var(--accent);
            padding: 1rem 1.25rem;
            margin-bottom: 2rem;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .error-message code {
            background: var(--accent-dim);
            padding: 0.15rem 0.45rem;
            color: var(--accent);
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.85rem 1.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--sans);
            letter-spacing: 0.03em;
        }

        .btn-primary {
            background: var(--accent);
            color: #0C0C0C;
        }

        .btn-primary:hover {
            background: #FFB733;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245,166,35,0.25);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .helpful-links {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .helpful-links h2 {
            font-family: var(--sans);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .link-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 2px solid var(--accent);
            padding: 0.9rem 1rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
        }

        .link-item:hover {
            background: #1C1C1C;
            transform: translateY(-2px);
        }

        .link-item-title {
            font-family: var(--sans);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            color: var(--text);
        }

        .link-item-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }

            h1 {
                font-size: 1.4rem;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Oops! Page Not Found</h1>
        <p>The page you're looking for seems to have taken an unscheduled detour.</p>

        <div class="error-message">
            <strong>URL attempted:</strong> <code id="current-url"></code>
        </div>

        <div class="buttons">
            <a href="/" class="btn btn-primary">Back to Home</a>
            <a href="/#blog" class="btn btn-secondary">Read Blog</a>
        </div>

        <div class="helpful-links">
            <h2>Popular Pages</h2>
            <div class="links-grid">
                <a href="/#about" class="link-item">
                    <div class="link-item-title">About</div>
                    <div class="link-item-desc">Learn about my work</div>
                </a>
                <a href="/#experience" class="link-item">
                    <div class="link-item-title">Experience</div>
                    <div class="link-item-desc">Career highlights</div>
                </a>
                <a href="/#blog" class="link-item">
                    <div class="link-item-title">Blog</div>
                    <div class="link-item-desc">Latest articles</div>
                </a>
                <a href="/#contact" class="link-item">
                    <div class="link-item-title">Contact</div>
                    <div class="link-item-desc">Get in touch</div>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Display the attempted URL
        document.getElementById('current-url').textContent = window.location.pathname;
    </script>
</body>
</html>
